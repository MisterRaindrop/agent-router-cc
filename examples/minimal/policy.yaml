# Minimal router policy. Copy to .router/policy.yaml after `router init`.
# Uses only node (no build system, no dependencies) so the verifier runs anywhere.
schema_version: 1
max_concurrent_workers: 1

# The executor. Both codex and claude are plan-auth CLIs (no API key needed).
# For a fallback chain, use `workers: [{kind: codex}, {kind: claude}]` instead.
worker:
  kind: codex
  stall_minutes: 5

# Diff-side scope enforcement (checked AFTER the executor runs).
scope:
  forbidden_globs: [".router/**", "**/*.lock"]
  test_globs: ["test/**"] # test files may not be deleted/emptied to fake a pass
  max_changed_lines: 100

# The mechanical gate. Every command is an argv array (no shell). Commands are read
# from the frozen base_sha git object, so they cannot be tampered with mid-run.
verification:
  build:
    - ["node", "--check", "src/slugify.mjs"] # syntax gate stands in for a real build
  test:
    - ["node", "--test"] # auto-discovers test/**/*.test.mjs (Node's built-in runner)

# Optional M2 hardening (all inert unless set):
#   escalation: { max_attempts: 2 }          # retry then rescue, else NEEDS_REPLAN
#   budget_caps: { max_cost_usd: 1.0 }        # refuse new runs past this spend
#   secret_scan: { enabled: true }            # fail verification on leaked secrets
